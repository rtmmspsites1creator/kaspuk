<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#101718">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RekapKas — Catatan Keuangan</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<style>
  :root{
    --bg:#101718;
    --surface:#1A2426;
    --surface-2:#212D30;
    --border:#2B3739;
    --text:#ECEFEC;
    --text-muted:#8FA3A6;
    --mint:#5EEAD4;
    --mint-dim:#1F3A36;
    --rose:#FB7185;
    --rose-dim:#3A1F26;
    --amber:#FACC15;
    --amber-dim:#3A3016;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
    --radius:18px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    padding-bottom:110px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{ max-width:480px; margin:0 auto; padding:0 16px; }

  /* ---------- Header ---------- */
  header{
    position:sticky; top:0; z-index:20;
    background:rgba(16,23,24,0.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
  }
  .header-inner{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px 12px;
    max-width:480px; margin:0 auto;
  }
  .brand{ display:flex; align-items:center; gap:9px; }
  .brand-mark{
    width:34px; height:34px; border-radius:10px;
    background:linear-gradient(135deg,var(--mint),#2DD4BF);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; color:#0A1413; font-size:16px;
  }
  .brand-name{ font-family:var(--font-display); font-weight:700; font-size:18px; letter-spacing:-0.02em; }
  select#monthSelect{
    background:var(--surface-2); color:var(--text); border:1px solid var(--border);
    border-radius:10px; padding:8px 10px; font-family:var(--font-mono); font-size:13px;
    font-weight:500; appearance:none; -webkit-appearance:none;
  }

  /* ---------- Receipt / Dashboard ---------- */
  .receipt-holder{ padding-top:18px; }
  .notch-top, .notch-bottom{
    height:11px;
    background-image: radial-gradient(circle 8px at 8px 0px, transparent 8px, var(--surface) 8.5px);
    background-size:18px 16px;
    background-repeat:repeat-x;
    background-position:left top;
  }
  .notch-bottom{
    background-image: radial-gradient(circle 8px at 8px 11px, transparent 8px, var(--surface) 8.5px);
    background-position:left bottom;
  }
  .receipt{
    background:var(--surface);
    padding:20px 20px 18px;
    position:relative;
  }
  .receipt-label{
    font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--text-muted); font-weight:600; margin-bottom:4px;
  }
  .saldo-value{
    font-family:var(--font-mono); font-weight:700; font-size:34px;
    letter-spacing:-0.01em; font-variant-numeric:tabular-nums;
  }
  .saldo-value.negative{ color:var(--rose); }
  .receipt-divider{
    border:none; border-top:1px dashed var(--border); margin:16px 0 14px;
  }
  .receipt-row{ display:flex; justify-content:space-between; }
  .receipt-col{ flex:1; }
  .receipt-col + .receipt-col{ text-align:right; }
  .mini-label{
    display:flex; align-items:center; gap:6px;
    font-size:12px; color:var(--text-muted); font-weight:500; margin-bottom:4px;
  }
  .receipt-col + .receipt-col .mini-label{ justify-content:flex-end; }
  .dot{ width:7px; height:7px; border-radius:50%; }
  .dot.in{ background:var(--mint); }
  .dot.out{ background:var(--rose); }
  .mini-value{
    font-family:var(--font-mono); font-weight:700; font-size:17px;
    font-variant-numeric:tabular-nums;
  }
  .mini-value.in{ color:var(--mint); }
  .mini-value.out{ color:var(--rose); }

  /* ---------- Mic ---------- */
  .mic-zone{ display:flex; flex-direction:column; align-items:center; padding:26px 0 8px; }
  #micBtn{
    width:88px; height:88px; border-radius:50%; border:none; cursor:pointer;
    background:linear-gradient(150deg,var(--amber),#F59E0B);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 24px rgba(250,204,21,0.25);
    position:relative; transition:transform .15s ease;
  }
  #micBtn:active{ transform:scale(0.94); }
  #micBtn.listening{ animation:pulse 1.4s ease-out infinite; }
  #micBtn svg{ width:34px; height:34px; }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(250,204,21,0.45), 0 8px 24px rgba(250,204,21,0.25); }
    70%{ box-shadow:0 0 0 22px rgba(250,204,21,0), 0 8px 24px rgba(250,204,21,0.25); }
    100%{ box-shadow:0 0 0 0 rgba(250,204,21,0), 0 8px 24px rgba(250,204,21,0.25); }
  }
  .mic-status{ margin-top:12px; font-size:13px; color:var(--text-muted); text-align:center; min-height:18px; padding:0 24px; }
  .mic-status b{ color:var(--text); font-weight:600; }

  /* ---------- Form ---------- */
  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px; margin-top:16px;
  }
  .card-title{
    font-family:var(--font-display); font-weight:600; font-size:15px; margin:0 0 14px;
    display:flex; align-items:center; gap:8px;
  }
  .type-toggle{ display:flex; gap:8px; margin-bottom:12px; }
  .type-btn{
    flex:1; padding:12px 0; border-radius:12px; border:1px solid var(--border);
    background:var(--surface-2); color:var(--text-muted); font-weight:600; font-size:14px;
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .type-btn[data-type="in"].active{ background:var(--mint-dim); border-color:var(--mint); color:var(--mint); }
  .type-btn[data-type="out"].active{ background:var(--rose-dim); border-color:var(--rose); color:var(--rose); }

  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:12px; color:var(--text-muted); margin-bottom:6px; font-weight:500; }
  .field input{
    width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    border-radius:12px; padding:13px 14px; font-size:15px; font-family:var(--font-body);
  }
  .field input#amountInput{ font-family:var(--font-mono); font-weight:600; font-size:17px; }
  .field input:focus{ outline:none; border-color:var(--mint); }

  #saveBtn{
    width:100%; padding:15px 0; border:none; border-radius:12px; cursor:pointer;
    background:var(--mint); color:#08201C; font-weight:700; font-size:15px;
    font-family:var(--font-display); margin-top:4px;
  }
  #saveBtn:active{ transform:scale(0.98); }

  /* ---------- Transaction list ---------- */
  .list-header{
    display:flex; justify-content:space-between; align-items:center;
    margin:22px 2px 10px;
  }
  .list-header h2{ font-family:var(--font-display); font-size:15px; font-weight:600; margin:0; }
  .list-header span{ font-size:12px; color:var(--text-muted); }
  #txList{ display:flex; flex-direction:column; gap:8px; }
  .tx-row{
    display:flex; align-items:center; gap:12px;
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:12px 12px;
  }
  .tx-icon{
    width:38px; height:38px; border-radius:10px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .tx-icon.in{ background:var(--mint-dim); color:var(--mint); }
  .tx-icon.out{ background:var(--rose-dim); color:var(--rose); }
  .tx-icon svg{ width:18px; height:18px; }
  .tx-body{ flex:1; min-width:0; }
  .tx-desc{ font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tx-date{ font-size:11.5px; color:var(--text-muted); margin-top:1px; }
  .tx-amount{ font-family:var(--font-mono); font-weight:700; font-size:14.5px; white-space:nowrap; }
  .tx-amount.in{ color:var(--mint); }
  .tx-amount.out{ color:var(--rose); }
  .tx-del{
    background:none; border:none; color:var(--text-muted); padding:4px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .tx-del svg{ width:17px; height:17px; }
  .empty-state{
    text-align:center; padding:34px 20px; color:var(--text-muted); font-size:13.5px;
    border:1px dashed var(--border); border-radius:14px;
  }

  /* ---------- Bottom bar ---------- */
  .bottom-bar{
    position:fixed; left:0; right:0; bottom:0; z-index:20;
    background:rgba(16,23,24,0.92); backdrop-filter:blur(10px);
    border-top:1px solid var(--border);
    padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  }
  .bottom-bar-inner{ max-width:480px; margin:0 auto; }
  #exportBtn{
    width:100%; padding:14px 0; border-radius:12px; border:1px solid var(--border);
    background:var(--surface-2); color:var(--text); font-weight:600; font-size:14px;
    display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;
    font-family:var(--font-body);
  }
  #exportBtn svg{ width:17px; height:17px; color:var(--amber); }

  /* ---------- Toast ---------- */
  #toast{
    position:fixed; left:50%; bottom:92px; transform:translateX(-50%) translateY(20px);
    background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    padding:11px 18px; border-radius:30px; font-size:13.5px; font-weight:500;
    opacity:0; pointer-events:none; transition:all .25s ease; z-index:50;
    max-width:90%; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .unsupported{
    font-size:11.5px; color:var(--rose); text-align:center; margin-top:8px;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-mark">R</div>
      <div class="brand-name">RekapKas</div>
    </div>
    <select id="monthSelect"></select>
  </div>
</header>

<div class="wrap">

  <!-- SALDO RECEIPT -->
  <div class="receipt-holder">
    <div class="notch-top"></div>
    <div class="receipt">
      <div class="receipt-label">Saldo akhir bulan ini</div>
      <div class="saldo-value" id="saldoValue">Rp0</div>
      <hr class="receipt-divider">
      <div class="receipt-row">
        <div class="receipt-col">
          <div class="mini-label"><span class="dot in"></span> Pemasukan</div>
          <div class="mini-value in" id="totalIn">Rp0</div>
        </div>
        <div class="receipt-col">
          <div class="mini-label">Pengeluaran <span class="dot out"></span></div>
          <div class="mini-value out" id="totalOut">Rp0</div>
        </div>
      </div>
    </div>
    <div class="notch-bottom"></div>
  </div>

  <!-- MIC -->
  <div class="mic-zone">
    <button id="micBtn" aria-label="Catat dengan suara">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1A1206" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <div class="mic-status" id="micStatus">Tekan lalu ucapkan, misal <b>"makan siang lima puluh ribu"</b></div>
  </div>

  <!-- FORM -->
  <div class="card">
    <div class="card-title">📝 Catat Transaksi</div>
    <div class="type-toggle">
      <button class="type-btn active" data-type="out" id="btnOut">↓ Pengeluaran</button>
      <button class="type-btn" data-type="in" id="btnIn">↑ Pemasukan</button>
    </div>
    <div class="field">
      <label for="dateInput">Tanggal</label>
      <input type="date" id="dateInput">
    </div>
    <div class="field">
      <label for="descInput">Keterangan</label>
      <input type="text" id="descInput" placeholder="Contoh: Makan siang">
    </div>
    <div class="field">
      <label for="amountInput">Nominal (Rp)</label>
      <input type="text" inputmode="numeric" id="amountInput" placeholder="0">
    </div>
    <button id="saveBtn">Simpan Transaksi</button>
  </div>

  <!-- LIST -->
  <div class="list-header">
    <h2>Riwayat Transaksi</h2>
    <span id="txCount">0 transaksi</span>
  </div>
  <div id="txList"></div>

</div>

<div class="bottom-bar">
  <div class="bottom-bar-inner">
    <button id="exportBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/></svg>
      Cetak Laporan PDF
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
(function(){
  "use strict";

  /* ---------------- Storage ---------------- */
  const DB_KEY = 'rekapkas_db_v1';
  const MONTHS_ID = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

  function loadDB(){
    try{ return JSON.parse(localStorage.getItem(DB_KEY)) || {}; }
    catch(e){ return {}; }
  }
  function saveDB(db){ localStorage.setItem(DB_KEY, JSON.stringify(db)); }

  function getMonthKey(d){
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  }
  function monthLabel(key){
    const [y,m] = key.split('-');
    return MONTHS_ID[parseInt(m,10)-1] + ' ' + y;
  }
  function todayISO(){
    const d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function formatRupiah(n){
    n = Math.round(n||0);
    return 'Rp' + n.toLocaleString('id-ID');
  }
  function formatDateShort(iso){
    const d = new Date(iso+'T00:00:00');
    const days = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
    return days[d.getDay()] + ', ' + d.getDate() + ' ' + MONTHS_ID[d.getMonth()].slice(0,3);
  }

  let db = loadDB();
  let currentMonth = getMonthKey(new Date());
  if(!db[currentMonth]) db[currentMonth] = [];

  /* ---------------- DOM refs ---------------- */
  const monthSelect = document.getElementById('monthSelect');
  const saldoValue = document.getElementById('saldoValue');
  const totalInEl = document.getElementById('totalIn');
  const totalOutEl = document.getElementById('totalOut');
  const txListEl = document.getElementById('txList');
  const txCountEl = document.getElementById('txCount');
  const dateInput = document.getElementById('dateInput');
  const descInput = document.getElementById('descInput');
  const amountInput = document.getElementById('amountInput');
  const saveBtn = document.getElementById('saveBtn');
  const btnIn = document.getElementById('btnIn');
  const btnOut = document.getElementById('btnOut');
  const micBtn = document.getElementById('micBtn');
  const micStatus = document.getElementById('micStatus');
  const exportBtn = document.getElementById('exportBtn');
  const toastEl = document.getElementById('toast');

  let selectedType = 'out';
  dateInput.value = todayISO();

  /* ---------------- Toast ---------------- */
  let toastTimer;
  function showToast(msg){
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(()=> toastEl.classList.remove('show'), 2400);
  }

  /* ---------------- Month select ---------------- */
  function renderMonthOptions(){
    const keys = Object.keys(db);
    if(!keys.includes(currentMonth)) keys.push(currentMonth);
    keys.sort().reverse();
    monthSelect.innerHTML = keys.map(k =>
      `<option value="${k}" ${k===currentMonth?'selected':''}>${monthLabel(k)}</option>`
    ).join('');
  }
  monthSelect.addEventListener('change', ()=>{
    currentMonth = monthSelect.value;
    if(!db[currentMonth]) db[currentMonth] = [];
    renderAll();
  });

  /* ---------------- Type toggle ---------------- */
  function setType(type){
    selectedType = type;
    btnIn.classList.toggle('active', type==='in');
    btnOut.classList.toggle('active', type==='out');
  }
  btnIn.addEventListener('click', ()=> setType('in'));
  btnOut.addEventListener('click', ()=> setType('out'));

  /* ---------------- Amount live formatting ---------------- */
  amountInput.addEventListener('input', ()=>{
    const digits = amountInput.value.replace(/[^\d]/g,'');
    amountInput.value = digits ? parseInt(digits,10).toLocaleString('id-ID') : '';
  });

  /* ---------------- Save transaction ---------------- */
  saveBtn.addEventListener('click', ()=>{
    const date = dateInput.value || todayISO();
    const desc = descInput.value.trim();
    const amountRaw = amountInput.value.replace(/[^\d]/g,'');
    const amount = parseInt(amountRaw||'0',10);

    if(!desc){ showToast('Isi keterangan dulu ya'); descInput.focus(); return; }
    if(!amount){ showToast('Nominal belum diisi'); amountInput.focus(); return; }

    const monthKey = getMonthKey(new Date(date+'T00:00:00'));
    if(!db[monthKey]) db[monthKey] = [];
    db[monthKey].push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
      date, type: selectedType, desc, amount
    });
    saveDB(db);

    // reset form
    descInput.value = '';
    amountInput.value = '';
    dateInput.value = todayISO();
    setType('out');

    if(monthKey !== currentMonth){
      currentMonth = monthKey;
    }
    showToast('Tersimpan · ' + formatRupiah(amount));
    renderAll();
  });

  /* ---------------- Delete transaction ---------------- */
  function deleteTx(id){
    db[currentMonth] = db[currentMonth].filter(t => t.id !== id);
    saveDB(db);
    showToast('Transaksi dihapus');
    renderAll();
  }

  /* ---------------- Render ---------------- */
  function renderDashboard(){
    const list = db[currentMonth] || [];
    const totalIn = list.filter(t=>t.type==='in').reduce((s,t)=>s+t.amount,0);
    const totalOut = list.filter(t=>t.type==='out').reduce((s,t)=>s+t.amount,0);
    const saldo = totalIn - totalOut;
    totalInEl.textContent = formatRupiah(totalIn);
    totalOutEl.textContent = formatRupiah(totalOut);
    saldoValue.textContent = formatRupiah(saldo);
    saldoValue.classList.toggle('negative', saldo < 0);
  }

  const iconIn = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`;
  const iconOut = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>`;
  const iconTrash = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;

  function renderList(){
    const list = [...(db[currentMonth] || [])].sort((a,b)=> b.date.localeCompare(a.date));
    txCountEl.textContent = list.length + ' transaksi';
    if(list.length === 0){
      txListEl.innerHTML = `<div class="empty-state">Belum ada transaksi bulan ini.<br>Mulai catat lewat mikrofon atau form di atas.</div>`;
      return;
    }
    txListEl.innerHTML = list.map(t => `
      <div class="tx-row">
        <div class="tx-icon ${t.type}">${t.type==='in' ? iconIn : iconOut}</div>
        <div class="tx-body">
          <div class="tx-desc">${escapeHTML(t.desc)}</div>
          <div class="tx-date">${formatDateShort(t.date)}</div>
        </div>
        <div class="tx-amount ${t.type}">${t.type==='in'?'+':'-'}${formatRupiah(t.amount)}</div>
        <button class="tx-del" data-id="${t.id}" aria-label="Hapus">${iconTrash}</button>
      </div>
    `).join('');

    txListEl.querySelectorAll('.tx-del').forEach(btn=>{
      btn.addEventListener('click', ()=> deleteTx(btn.dataset.id));
    });
  }

  function escapeHTML(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderAll(){
    renderMonthOptions();
    renderDashboard();
    renderList();
  }

  /* ================= VOICE INPUT ================= */
  const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let isListening = false;

  const NUMBER_WORDS = new Set([
    'nol','satu','se','dua','tiga','empat','lima','enam','tujuh','delapan','sembilan',
    'sepuluh','sebelas','belas','puluh','seratus','ratus','seribu','ribu','sejuta','juta'
  ]);
  const UNITS = {nol:0,satu:1,dua:2,tiga:3,empat:4,lima:5,enam:6,tujuh:7,delapan:8,sembilan:9};
  const INCOME_KEYWORDS = ['gaji','gajian','terima','diterima','dapat','dana masuk','transfer masuk','bonus','thr','untung','pendapatan','hasil jual','cair','komisi'];

  function wordsToNumber(tokens){
    let total = 0, current = 0;
    for(const w of tokens){
      if(w === 'sepuluh'){ current += 10; continue; }
      if(w === 'sebelas'){ current += 11; continue; }
      if(w === 'seratus'){ total += 100; current = 0; continue; }
      if(w === 'seribu'){ total += 1000; current = 0; continue; }
      if(w === 'sejuta'){ total += 1000000; current = 0; continue; }
      if(w === 'se'){ current += 1; continue; }
      if(w in UNITS){ current += UNITS[w]; continue; }
      if(w === 'belas'){ current += 10; continue; }
      if(w === 'puluh'){ current = (current || 1) * 10; continue; }
      if(w === 'ratus'){ current = (current || 1) * 100; total += current; current = 0; continue; }
      if(w === 'ribu'){ current = (current || 1) * 1000; total += current; current = 0; continue; }
      if(w === 'juta'){ current = (current || 1) * 1000000; total += current; current = 0; continue; }
    }
    return total + current;
  }

  function extractAmount(lowerText){
    // 1) Coba pola angka digit dulu (Chrome sering otomatis mengubah ucapan angka jadi digit)
    const digitMatch = lowerText.match(/(\d[\d.,]*)\s*(ribu|rb\.?|juta|jt\.?)?/i);
    if(digitMatch && digitMatch[1].replace(/[.,]/g,'').length > 0){
      let val = parseInt(digitMatch[1].replace(/[.,]/g,''), 10);
      const suf = (digitMatch[2]||'').toLowerCase();
      if(suf.startsWith('rb')) val *= 1000;
      else if(suf.startsWith('jt')) val *= 1000000;
      if(val > 0){
        return { value: val, span: digitMatch[0] };
      }
    }
    // 2) Fallback: cari deretan kata angka bahasa Indonesia
    const words = lowerText.split(/\s+/);
    let start = -1, end = -1;
    for(let i=0;i<words.length;i++){
      if(NUMBER_WORDS.has(words[i])){
        if(start === -1) start = i;
        end = i;
      } else if(start !== -1){
        break;
      }
    }
    if(start !== -1){
      const tokens = words.slice(start, end+1);
      const value = wordsToNumber(tokens);
      if(value > 0){
        return { value, span: tokens.join(' ') };
      }
    }
    return { value: 0, span: '' };
  }

  function detectType(lowerText){
    return INCOME_KEYWORDS.some(k => lowerText.includes(k)) ? 'in' : 'out';
  }

  function buildDescription(originalLower, span){
    let desc = originalLower;
    if(span){
      const idx = desc.indexOf(span);
      if(idx !== -1) desc = desc.slice(0, idx) + desc.slice(idx + span.length);
    }
    desc = desc.replace(/\b(rupiah|rp|sebesar|sejumlah|senilai|kurang lebih|sekitar)\b/gi, ' ');
    desc = desc.replace(/\s+/g,' ').trim();
    if(!desc) desc = selectedType === 'in' ? 'Pemasukan' : 'Pengeluaran';
    return desc.charAt(0).toUpperCase() + desc.slice(1);
  }

  function processVoiceInput(transcript){
    const lower = transcript.toLowerCase().trim();
    const { value: amount, span } = extractAmount(lower);
    const type = detectType(lower);
    const desc = buildDescription(lower, span);

    setType(type);
    descInput.value = desc;
    amountInput.value = amount ? amount.toLocaleString('id-ID') : '';
    dateInput.value = todayISO();

    if(amount){
      micStatus.innerHTML = `🎙 "${escapeHTML(transcript)}" → form terisi. Cek lalu tekan <b>Simpan</b>.`;
    } else {
      micStatus.innerHTML = `🎙 "${escapeHTML(transcript)}" → nominal tidak terdeteksi, isi manual ya.`;
      amountInput.focus();
    }
  }

  if(SpeechRecognitionAPI){
    recognition = new SpeechRecognitionAPI();
    recognition.lang = 'id-ID';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = ()=>{
      isListening = true;
      micBtn.classList.add('listening');
      micStatus.innerHTML = '<b>Mendengarkan...</b> silakan bicara';
    };
    recognition.onresult = (e)=>{
      const transcript = e.results[0][0].transcript;
      processVoiceInput(transcript);
    };
    recognition.onerror = (e)=>{
      micStatus.textContent = 'Tidak terdengar jelas, coba lagi.';
    };
    recognition.onend = ()=>{
      isListening = false;
      micBtn.classList.remove('listening');
    };

    micBtn.addEventListener('click', ()=>{
      if(isListening){ recognition.stop(); return; }
      try{ recognition.start(); }
      catch(e){ /* already started guard */ }
    });
  } else {
    micBtn.disabled = true;
    micBtn.style.opacity = '0.4';
    micStatus.innerHTML = 'Input suara tidak didukung di browser ini.<div class="unsupported">Gunakan Google Chrome untuk fitur ini.</div>';
  }

  /* ================= EXPORT PDF ================= */
  exportBtn.addEventListener('click', ()=>{
    const list = [...(db[currentMonth] || [])].sort((a,b)=> a.date.localeCompare(b.date));
    if(list.length === 0){ showToast('Belum ada transaksi untuk dicetak'); return; }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFont('helvetica','bold');
    doc.setFontSize(16);
    doc.text('Laporan Keuangan', 14, 18);
    doc.setFontSize(11);
    doc.setFont('helvetica','normal');
    doc.text('Periode: ' + monthLabel(currentMonth), 14, 25);

    const totalIn = list.filter(t=>t.type==='in').reduce((s,t)=>s+t.amount,0);
    const totalOut = list.filter(t=>t.type==='out').reduce((s,t)=>s+t.amount,0);
    const saldo = totalIn - totalOut;

    const body = list.map(t => [
      formatDateShort(t.date),
      t.desc,
      t.type === 'in' ? 'Pemasukan' : 'Pengeluaran',
      (t.type==='in'?'+':'-') + formatRupiah(t.amount)
    ]);

    doc.autoTable({
      head: [['Tanggal','Keterangan','Jenis','Nominal']],
      body: body,
      startY: 32,
      styles: { font:'helvetica', fontSize: 9, cellPadding: 3 },
      headStyles: { fillColor: [26, 36, 38] },
      columnStyles: { 3: { halign:'right' } }
    });

    let finalY = doc.lastAutoTable.finalY + 10;
    doc.setFont('helvetica','bold');
    doc.setFontSize(11);
    doc.text('Total Pemasukan  : ' + formatRupiah(totalIn), 14, finalY);
    doc.text('Total Pengeluaran : ' + formatRupiah(totalOut), 14, finalY + 7);
    doc.setFontSize(12);
    doc.text('Saldo Akhir       : ' + formatRupiah(saldo), 14, finalY + 16);

    doc.save(`Laporan-Keuangan-${currentMonth}.pdf`);
    showToast('Laporan PDF sedang diunduh');
  });

  /* ---------------- Init ---------------- */
  setType('out');
  renderAll();

})();
</script>
</body>
</html>
